version: '3'
services:
  # qwen3-tts_img_service:
  #   image: afirezd/qwen3-tts:v0.1
  #   build:
  #     context: .
  #     dockerfile: ./Dockerfile
  qwen3-tts-service:
    image: afirezd/qwen3-tts:v0.1
    # runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: "nvidia"
              count: "all"
              capabilities: ["gpu"]
    ports:
      - "8000:8000"
    ipc: host
    ulimits:
      memlock: -1
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - GRADIO_SERVER_NAME=0.0.0.0  # Gradio 配置1：允许外部访问
      - GRADIO_SERVER_PORT=8000     # Gradio 配置2：指定端口
    volumes:
      # - ./tmp/app:/app # 1
      - ./tmp/my_hf_cache:/app/tmp/my_hf_cache
    stdin_open: true
    tty: true
    # command: uv run qwen-tts-demo Qwen/Qwen3-TTS-12Hz-1.7B-Base --ip 0.0.0.0 --port 8000 --no-flash-attn