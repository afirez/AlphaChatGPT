version: '3'
services:
  llm-yi-34b:
    image: afirezd/llm-yi-34b:v0.1
    # runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: "nvidia"
              count: "all"
              capabilities: ["gpu"]
    ports:
      - "8080:8080"
    ipc: host
    ulimits:
      memlock: -1
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - .:/app # 1
      - ./workspace:/workspace
    stdin_open: true
    tty: true
    command: bash